<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ recipe.title }} - 食譜分享</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- 唯讀分享頁專屬的精簡導覽列 -->
    <nav class="navbar navbar-dark bg-secondary mb-4 shadow-sm">
        <div class="container d-flex justify-content-center">
            <span class="navbar-brand mb-0 h1">📖 食譜收藏夾 - 唯讀分享模式</span>
        </div>
    </nav>

    <div class="container py-4">
        <div class="card shadow border-0">
            {% if recipe.image_url %}
            <img src="{{ recipe.image_url }}" class="card-img-top" alt="{{ recipe.title }}" style="max-height: 400px; object-fit: cover;">
            {% endif %}
            
            <div class="card-body p-5">
                <div class="text-center mb-5">
                    <h1 class="card-title fw-bold mb-3">{{ recipe.title }}</h1>
                    <span class="badge bg-primary fs-6 px-3 py-2">
                        {{ recipe.category.name if recipe.category else '未分類' }}
                    </span>
                    <p class="text-muted mt-3">建立於 {{ recipe.created_at.strftime('%Y-%m-%d') }}</p>
                </div>

                <div class="row mt-5">
                    <div class="col-md-4 mb-4 mb-md-0">
                        <div class="p-4 bg-white border rounded shadow-sm h-100">
                            <h4 class="fw-bold mb-3 border-bottom pb-2 text-success">🛒 準備食材</h4>
                            <p class="card-text fs-6" style="white-space: pre-line; line-height: 1.8;">{{ recipe.ingredients }}</p>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="p-4 bg-white border rounded shadow-sm h-100">
                            <h4 class="fw-bold mb-3 border-bottom pb-2 text-primary">🍳 料理步驟</h4>
                            <p class="card-text fs-5" style="white-space: pre-line; line-height: 2;">{{ recipe.steps }}</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card-footer text-center py-4 bg-white border-top-0">
                <p class="text-muted small mb-0">這個食譜是由「食譜收藏夾」分享出來的</p>
            </div>
        </div>
    </div>
</body>
</html>
