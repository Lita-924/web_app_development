{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-warning">
                <h4 class="mb-0">編輯食譜</h4>
            </div>
            <div class="card-body">
                <form action="{{ url_for('recipe.update_recipe', id=recipe.id) }}" method="POST">
                    
                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold">食譜名稱 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="title" name="title" value="{{ recipe.title }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="category_id" class="form-label fw-bold">分類</label>
                        <select class="form-select" id="category_id" name="category_id">
                            <option value="">未分類</option>
                            {% for cat in categories %}
                            <option value="{{ cat.id }}" {% if recipe.category_id == cat.id %}selected{% endif %}>
                                {{ cat.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="image_url" class="form-label fw-bold">圖片網址</label>
                        <input type="url" class="form-control" id="image_url" name="image_url" value="{{ recipe.image_url or '' }}">
                    </div>

                    <div class="mb-3">
                        <label for="ingredients" class="form-label fw-bold">食材 <span class="text-danger">*</span></label>
                        <textarea class="form-control" id="ingredients" name="ingredients" rows="5" required>{{ recipe.ingredients }}</textarea>
                    </div>

                    <div class="mb-4">
                        <label for="steps" class="form-label fw-bold">步驟 <span class="text-danger">*</span></label>
                        <textarea class="form-control" id="steps" name="steps" rows="6" required>{{ recipe.steps }}</textarea>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('recipe.recipe_detail', id=recipe.id) }}" class="btn btn-light me-md-2">取消</a>
                        <button type="submit" class="btn btn-warning">更新食譜</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
